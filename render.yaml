services:
  # ── Full-stack service: Express serves API + React SPA ──
  # Build: installs & builds the React client, then installs server deps.
  # Start: Node.js Express server which also serves the React build.
  # SPA routing is handled by the Express catch-all — no static-site tricks needed.
  - type: web
    name: shoping-waze-server-auth
    env: node
    region: frankfurt
    buildCommand: cd client && npm install && npm run build && cd ../server_auth && npm install
    startCommand: node server_auth/index.js
    envVars:
      - key: NODE_ENV
        value: production

  # ── React SPA — Static Site ──────────────────────────────
  # The `routes` rewrite rule is the critical fix for page-refresh "Not Found":
  # without it, Render returns 404 for any path that isn't a real file (e.g. /cart).
  # The rewrite sends every request to index.html so React Router handles routing
  # entirely on the client side — exactly like the _redirects file intends.
  - type: static
    name: client-app-shoping-waze
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── FastAPI (backend_server) — סריקת קבלות / השוואת מחירים ─────────
  # חובה: startCommand עם --host 0.0.0.0 ו-$PORT — אחרת Render מדווח "No open ports detected"
  # מיגרציות ב-Pre-Deploy כדי שלא יעכבו את פתיחת הפורט (timeout של Render)
  - type: web
    name: shoping-waze-backend-api
    env: python
    region: frankfurt
    rootDir: backend_server
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RUN_ALEMBIC_ON_STARTUP
        value: "false"
