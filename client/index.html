<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!--
      Favicon: references /favicon.svg from the public/ folder.
      Using a file path (instead of an inline data-URI) ensures the icon is
      resolved consistently on every route — including deep paths like /cart or
      /shared-cart/:id — because the path is always absolute from the domain root.
      The file is copied verbatim to dist/ by Vite during build.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Shopping Waze | השוואת מחירים</title>
    <meta name="description" content="Shopping Waze - הדרך החכמה שלכם להשוות מחירים ולחסוך בקניות" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
